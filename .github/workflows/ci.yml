---
name: CI

on:  # yamllint disable-line rule:truthy
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-22.04']
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
        # Add a single Windows leg so the ExifTool-backed photomap / MP4
        # timed-metadata tests actually run on Windows (path, subprocess and
        # encoding handling differ). One Python version keeps CI cost down.
        include:
          - os: 'windows-latest'
            python-version: '3.12'
    defaults:
      run:
        # Git Bash ships on the Windows runners, so the bash-syntax steps
        # below (|| true, ls -la, multi-line) work on every OS.
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev --extra build --python ${{ matrix.python-version }}
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy
      - name: Install ExifTool (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libimage-exiftool-perl
      - name: Install ExifTool (Windows)
        if: runner.os == 'Windows'
        run: choco install exiftool --no-progress -y
      - name: Pytest
        run: uv run pytest
      - name: Build package
        run: uv run python -m build

      - name: Smoke test - Version check
        run: |
          echo "Testing dji-embed --version"
          uv run dji-embed --version

      - name: Smoke test - Doctor command
        run: |
          echo "Testing dji-embed doctor (expect dependency warnings)"
          uv run dji-embed doctor || true

      - name: Smoke test - Check command with samples
        run: |
          echo "Testing dji-embed check with sample files"
          uv run dji-embed check examples/DJI_sample.SRT
          uv run dji-embed check samples/mini4pro/clip.SRT
          uv run dji-embed check samples/avata2/clip.SRT
          uv run dji-embed check samples/air3/clip.SRT

      - name: Smoke test - Convert command
        run: |
          echo "Testing dji-embed convert functionality"
          uv run dji-embed convert gpx examples/DJI_sample.SRT -o test_smoke.gpx
          uv run dji-embed convert csv examples/DJI_sample.SRT -o test_smoke.csv
          ls -la test_smoke.*

  # Desktop GUI (issue #264 stage 3): Avalonia app in gui/. Kept as its own
  # job so the Python matrix is untouched; ubuntu is enough for compile +
  # headless UI tests, Windows-specific packaging is exercised at release.
  gui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: dotnet build gui/DjiEmbed.Gui.sln --configuration Release
      - name: Test (headless)
        run: >
          dotnet test gui/DjiEmbed.Gui.sln --configuration Release
          --no-build --verbosity normal
