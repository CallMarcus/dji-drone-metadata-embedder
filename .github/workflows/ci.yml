---
name: CI

on:  # yamllint disable-line rule:truthy
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev --extra build --python ${{ matrix.python-version }}
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy
      - name: Pytest
        run: uv run pytest
      - name: Build package
        run: uv run python -m build

      - name: Smoke test - Version check
        run: |
          echo "Testing dji-embed --version"
          uv run dji-embed --version

      - name: Smoke test - Doctor command
        run: |
          echo "Testing dji-embed doctor (expect dependency warnings)"
          uv run dji-embed doctor || true

      - name: Smoke test - Check command with samples
        run: |
          echo "Testing dji-embed check with sample files"
          uv run dji-embed check examples/DJI_sample.SRT
          uv run dji-embed check samples/mini4pro/clip.SRT
          uv run dji-embed check samples/avata2/clip.SRT
          uv run dji-embed check samples/air3/clip.SRT

      - name: Smoke test - Convert command
        run: |
          echo "Testing dji-embed convert functionality"
          uv run dji-embed convert gpx examples/DJI_sample.SRT -o test_smoke.gpx
          uv run dji-embed convert csv examples/DJI_sample.SRT -o test_smoke.csv
          ls -la test_smoke.*
