---
name: Build Windows EXE

on:
  workflow_run:
    workflows: ["Release to PyPI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    if: ${{ (github.event_name == 'workflow_dispatch') || (github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v')) }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Ensure consistent line endings to avoid version check issues
          fetch-depth: 0
      - name: Configure git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - name: Determine release version
        id: meta
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $ver = '${{ inputs.version }}'
          } else {
            $ver = '${{ github.event.workflow_run.head_branch }}'.TrimStart('v')
          }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync and verify project version
        shell: pwsh
        run: |
          uv run python tools/sync_version.py ${{ steps.meta.outputs.version }}
          uv run python tools/sync_version.py ${{ steps.meta.outputs.version }} --check
      - name: Install dependencies
        shell: pwsh
        run: uv sync --extra build
      - name: Build EXE
        shell: pwsh
        run: uv run python tools/build_exe.py
      - name: Download wheel from PyPI
        shell: pwsh
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          # PyPI's Simple index (what pip reads) is CDN-cached and can lag the
          # Release-to-PyPI publish by a few minutes, so a single attempt often
          # fails with "No matching distribution found" right after a tag. Retry
          # with back-off until the new version propagates instead of failing
          # the release (which would skip creating the GitHub release).
          $ver = $env:VERSION
          $max = 12
          for ($i = 1; $i -le $max; $i++) {
            Write-Host "Attempt $i/${max}: downloading dji-drone-metadata-embedder==$ver ..."
            uv run pip download "dji-drone-metadata-embedder==$ver" --no-deps --no-cache-dir -d dist
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Wheel downloaded."
              exit 0
            }
            if ($i -lt $max) {
              Write-Host "Not on the PyPI simple index yet; waiting 30s for propagation ..."
              Start-Sleep -Seconds 30
            }
          }
          Write-Error "Wheel for $ver not on PyPI after $max attempts (~6 min)."
          exit 1
      - name: Generate SHA256SUMS.txt
        shell: pwsh
        run: |
          $hashLines = @()
          Get-ChildItem dist -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            $hashLines += "$($hash.Hash)  $($_.Name)"
          }
          $hashLines | Out-File -Encoding ascii dist/SHA256SUMS.txt
      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
      - name: Summary
        shell: pwsh
        run: |
          $tag = '${{ steps.meta.outputs.tag }}'
          echo "Windows binaries attached to [release $tag](https://github.com/${{ github.repository }}/releases/tag/$tag)" >> $env:GITHUB_STEP_SUMMARY
