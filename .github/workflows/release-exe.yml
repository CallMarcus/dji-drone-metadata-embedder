---
name: Build Windows EXE

# build (windows) -> sign (linux, Certum SimplySign container) -> publish.
# Checksums and the Sigstore attestation are generated AFTER signing:
# Authenticode signing changes the file hash, so they would not match the
# released binary otherwise.

on:
  workflow_run:
    workflows: ["Release to PyPI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.2.0)'
        required: true
        type: string

permissions:
  contents: write
  # Sigstore build provenance for the EXE (verify with `gh attestation verify`).
  id-token: write
  attestations: write
  # Pull the certum-signer container image from GHCR.
  packages: read

jobs:
  build:
    if: ${{ (github.event_name == 'workflow_dispatch') || (github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v')) }}
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Ensure consistent line endings to avoid version check issues
          fetch-depth: 0
      - name: Configure git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - name: Determine release version
        id: meta
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $ver = '${{ inputs.version }}'
          } else {
            $ver = '${{ github.event.workflow_run.head_branch }}'.TrimStart('v')
          }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync and verify project version
        shell: pwsh
        run: |
          uv run python tools/sync_version.py ${{ steps.meta.outputs.version }}
          uv run python tools/sync_version.py ${{ steps.meta.outputs.version }} --check
      - name: Install dependencies
        shell: pwsh
        run: uv sync --extra build
      - name: Build EXE
        shell: pwsh
        run: uv run python tools/build_exe.py
      - name: Download wheel from PyPI
        shell: pwsh
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          # PyPI's Simple index (what pip reads) is CDN-cached and can lag the
          # Release-to-PyPI publish by a few minutes, so a single attempt often
          # fails with "No matching distribution found" right after a tag. Retry
          # with back-off until the new version propagates instead of failing
          # the release (which would skip creating the GitHub release).
          $ver = $env:VERSION
          $max = 12
          for ($i = 1; $i -le $max; $i++) {
            Write-Host "Attempt $i/${max}: downloading dji-drone-metadata-embedder==$ver ..."
            uv run pip download "dji-drone-metadata-embedder==$ver" --no-deps --no-cache-dir -d dist
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Wheel downloaded."
              exit 0
            }
            if ($i -lt $max) {
              Write-Host "Not on the PyPI simple index yet; waiting 30s for propagation ..."
              Start-Sleep -Seconds 30
            }
          }
          Write-Error "Wheel for $ver not on PyPI after $max attempts (~6 min)."
          exit 1
      - name: Upload unsigned dist
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-dist
          path: dist/*
          if-no-files-found: error

  sign:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/callmarcus/dji-drone-metadata-embedder/certum-signer:2.9.14-jsign7.5
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      CERTUM_USER_ID: ${{ secrets.CERTUM_USER_ID }}
      CERTUM_OTP_URI: ${{ secrets.CERTUM_OTP_URI }}
      CERTUM_CERT_FINGERPRINT: ${{ secrets.CERTUM_CERT_FINGERPRINT }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: unsigned-dist
          path: dist
      - name: Sign dji-embed.exe
        uses: ./.github/actions/certum-sign
        with:
          files-glob: 'dist/*.exe'
      - name: Upload signed dist
        uses: actions/upload-artifact@v7
        with:
          name: signed-dist
          path: dist/*
          if-no-files-found: error

  publish:
    needs: [build, sign]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: signed-dist
          path: dist
      - name: Generate SHA256SUMS.txt
        run: |
          cd dist
          sha256sum -- * > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Attest build provenance
        # Sigstore-signed proof that dji-embed.exe came from this workflow.
        # Anyone can check it:
        #   gh attestation verify dji-embed.exe -R CallMarcus/dji-drone-metadata-embedder
        # The wheel is not attested here - it is downloaded from PyPI, which
        # already attests it via Trusted Publishing (PEP 740).
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/dji-embed.exe
      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
      - name: Summary
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          echo "Signed Windows binaries attached to [release $TAG](https://github.com/${GITHUB_REPOSITORY}/releases/tag/$TAG)" >> "$GITHUB_STEP_SUMMARY"
