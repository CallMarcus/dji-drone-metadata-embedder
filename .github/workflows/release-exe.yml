---
name: Build Windows EXE

on:
  workflow_run:
    workflows: ["Release to PyPI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.1.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    if: ${{ (github.event_name == 'workflow_dispatch') || (github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v')) }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Ensure consistent line endings to avoid version check issues
          fetch-depth: 0
      - name: Configure git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync and verify project version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = '${{ inputs.version }}'
          } else {
            $tag = '${{ github.event.workflow_run.head_branch }}'
            $tag = $tag.TrimStart('v')
          }
          uv run python tools/sync_version.py $tag
          uv run python tools/sync_version.py $tag --check
      - name: Install dependencies
        shell: pwsh
        run: uv sync --extra build
      - name: Build EXE
        shell: pwsh
        run: uv run python tools/build_exe.py
      - name: Download wheel from PyPI
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = 'v${{ inputs.version }}'
            $ver = '${{ inputs.version }}'
          } else {
            $tag = '${{ github.event.workflow_run.head_branch }}'
            $ver = $tag.TrimStart('v')
          }
          uv run pip download dji-drone-metadata-embedder==$ver --no-deps -d dist
      - name: Generate SHA256SUMS.txt
        shell: pwsh
        run: |
          $hashLines = @()
          Get-ChildItem dist -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            $hashLines += "$($hash.Hash)  $($_.Name)"
          }
          $hashLines | Out-File -Encoding ascii dist/SHA256SUMS.txt
      - name: Attach to GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = 'v${{ inputs.version }}'
          } else {
            $tag = '${{ github.event.workflow_run.head_branch }}'
          }
          gh release upload $tag dist/* --clobber
      - name: Summary
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = 'v${{ inputs.version }}'
          } else {
            $tag = '${{ github.event.workflow_run.head_branch }}'
          }
          echo "Windows binaries attached to [release $tag](https://github.com/${{ github.repository }}/releases/tag/$tag)" >> $env:GITHUB_STEP_SUMMARY
