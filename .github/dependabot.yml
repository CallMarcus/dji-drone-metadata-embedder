version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"

  # Use the "uv" ecosystem (not "pip") so Dependabot regenerates uv.lock
  # alongside pyproject.toml. Under "pip" it edited the manifest only and left
  # the lockfile stale (see #219).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      production-deps:
        dependency-type: "production"
      development-deps:
        dependency-type: "development"
